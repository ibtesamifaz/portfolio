on:
  push:
    branches: [master]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libgdal-dev libudunits2-dev

      - name: Install R packages
        run: |
          install.packages("rmarkdown")
          install.packages(c("tidyverse", "ggplot2", "scales", "knitr",
            "kableExtra", "sf", "patchwork", "ggrepel", "viridis",
            "corrplot", "plotly", "leaflet"))
        shell: Rscript {0}

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}