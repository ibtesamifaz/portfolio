project:
  type: website
  output-dir: _site

website:
  title: "Ibtesam Ifaz"
  description: "Data Visualisation Portfolio"
  favicon: favicon.ico

  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "Projects"
        menu:
          - text: "Cafés vs Pubs in Melbourne"
            href: cafes_vs_pubs.qmd
          - text: "National Election Analytics"
            href: election_analytics.qmd
          - text: "Military Spending Report"
            href: military_spending_report.qmd
    right:
      - icon: github
        href: https://github.com/YOUR_USERNAME
        aria-label: GitHub
      - icon: linkedin
        href: https://linkedin.com/in/YOUR_USERNAME
        aria-label: LinkedIn

  page-footer:
    center: "© 2025 Ibtesam Ifaz · Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light: flatly
      dark: darkly
    toc: true
    toc-depth: 2
    number-sections: false
    smooth-scroll: true
    code-fold: true
    code-tools: true
    highlight-style: github
    fig-align: center
    fig-width: 8
    fig-height: 5
    css: styles.css

execute:
  echo: false
  warning: false
  message: false
  freeze: auto
